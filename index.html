<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Toride Shi</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0a0a12;
      --bg-panel: #11111e;
      --accent: #00ff9d;
      --accent-dim: rgba(0, 255, 157, 0.3);
      --scanline: rgba(0, 0, 0, 0.25);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-dark);
      font-family: 'Press Start 2P', cursive;
      color: var(--accent);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      image-rendering: pixelated;
      position: relative;
    }

    /* CRT Scanlines */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 1px,
        var(--scanline) 1px,
        var(--scanline) 2px
      );
      pointer-events: none;
      z-index: 100;
      animation: scan 10s linear infinite;
    }

    @keyframes scan {
      0% { background-position: 0 0; }
      100% { background-position: 0 100vh; }
    }

    .card {
      background: var(--bg-panel);
      border: 3px solid var(--accent);
      border-radius: 4px;
      padding: 30px 25px;
      max-width: 400px;
      width: 100%;
      position: relative;
      z-index: 10;
      box-shadow: 0 0 15px var(--accent-dim);
    }

    .name {
      text-align: center;
      font-size: 1.1rem;
      margin-bottom: 25px;
      padding-bottom: 20px;
      border-bottom: 2px solid var(--accent-dim);
      letter-spacing: 1px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link {
      display: block;
      padding: 12px 16px;
      background: #1a1a2e;
      border: 2px solid var(--accent);
      color: var(--accent);
      text-decoration: none;
      font-size: 0.65rem;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.1s steps(2);
      image-rendering: pixelated;
    }

    .link:hover {
      background: var(--accent);
      color: var(--bg-dark);
      transform: translate(2px, 2px);
      box-shadow: -3px -3px 0 rgba(0,255,157,0.5);
    }

    .link:active {
      transform: translate(4px, 4px);
      box-shadow: none;
    }

    /* Platform accent borders */
    .link:nth-child(1) { border-color: #0088cc; }
    .link:nth-child(1):hover { background: #0088cc; color: #fff; }

    .link:nth-child(2) { border-color: #1b2838; }
    .link:nth-child(2):hover { background: #66c0f4; color: #1b2838; }

    .link:nth-child(3) { border-color: #ff0000; }
    .link:nth-child(3):hover { background: #ff0000; color: #fff; }

    .link:nth-child(4) { border-color: #0077ff; }
    .link:nth-child(4):hover { background: #0077ff; color: #fff; }

    .copyright {
      text-align: center;
      font-size: 0.5rem;
      color: var(--accent-dim);
      margin-top: 25px;
      padding-top: 15px;
      border-top: 1px solid var(--accent-dim);
    }

    @media (max-width: 420px) {
      .card { padding: 25px 20px; }
      .name { font-size: 0.95rem; }
      .link { font-size: 0.6rem; padding: 10px 14px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="name">TORIDE SHI</div>
    
    <div class="links">
      <a href="https://www.t.me/TorideShi" target="_blank" class="link">Telegram</a>
      <a href="https://steamcommunity.com/id/Torideshi/" target="_blank" class="link">Steam</a>
      <a href="https://www.youtube.com/@Toride-shi" target="_blank" class="link">YouTube</a>
      <a href="https://vk.com/toridevk" target="_blank" class="link">VK</a>
    </div>

    <div class="copyright">© 2026</div>
  </div>

  <script>
    // Subtle CRT flicker
    document.addEventListener('DOMContentLoaded', () => {
      const card = document.querySelector('.card');
      setInterval(() => {
        if (Math.random() > 0.97) {
          card.style.opacity = 0.96;
          setTimeout(() => card.style.opacity = 1, 40);
        }
      }, 150);
    });
  </script>
</body>
</html>
