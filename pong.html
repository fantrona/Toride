<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Toride Shi | PONG</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #150f24; --card: #1d142b; --text: #e2c8ff; --text-dim: rgba(226, 200, 255, 0.35);
      --border: #c9a2ff; --accent: #b388ff; --scan: rgba(40, 20, 60, 0.22);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); font-family: 'Press Start 2P', cursive; color: var(--text);
      min-height: 100vh; display: flex; justify-content: center; align-items: center;
      padding: 20px; image-rendering: pixelated; line-height: 1.5; overflow-x: hidden;
    }
    body::before {
      content: ""; position: fixed; inset: 0;
      background: repeating-linear-gradient(to bottom, transparent, transparent 1px, var(--scan) 1px, var(--scan) 2px);
      pointer-events: none; z-index: 98; animation: scan 12s linear infinite;
    }
    @keyframes scan { 0% { background-position: 0 0; } 100% { background-position: 0 100vh; } }
    #bg-particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .page {
      background: var(--card); border: 3px solid var(--border); padding: 30px 25px;
      max-width: 460px; width: 100%; position: relative; z-index: 10;
      box-shadow: 0 0 24px rgba(201, 162, 255, 0.15); text-align: center;
    }
    .title { font-size: 0.9rem; margin-bottom: 20px; color: var(--accent); text-shadow: 0 0 6px rgba(179, 136, 255, 0.4); }
    #pong-canvas { display: block; margin: 0 auto; border: 3px solid var(--border); background: #0d0716; box-shadow: inset 0 0 15px rgba(201, 162, 255, 0.2), 0 0 10px rgba(201, 162, 255, 0.15); max-width: 100%; }
    .pong-controls { font-size: 0.45rem; color: var(--text-dim); margin: 10px 0 20px; line-height: 1.5; }
    .link { display: inline-block; padding: 11px 18px; background: #241a35; border: 2px solid var(--border); color: var(--text); text-decoration: none; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.5px; transition: all 0.1s steps(2); cursor: pointer; margin: 0 auto; }
    .link:hover { background: var(--border); color: var(--bg); transform: translate(2px, 2px); }
    .footer { font-size: 0.5rem; color: var(--text-dim); margin-top: 20px; }
    @media (prefers-reduced-motion: no-preference) { .page { animation: flicker 0.25s infinite; } @keyframes flicker { 0%, 100% { opacity: 1; } 96% { opacity: 0.97; } 98% { opacity: 1; } } }
    @media (max-width: 420px) { .page { padding: 25px 20px; } .title { font-size: 0.8rem; } .link { font-size: 0.55rem; padding: 10px 14px; } }
  </style>
</head>
<body>
  <canvas id="bg-particles"></canvas>
  <div class="page">
    <div class="title">PONG TERMINAL</div>
    <canvas id="pong-canvas" width="350" height="250"></canvas>
    <div class="pong-controls">W / S или Стрелки : Движение | ПРОБЕЛ : Пауза</div>
    <a href="index.html" class="link">НАЗАД</a>
    <div class="footer">© 2026</div>
  </div>

  <script>
    // Background particles (same as index)
    const bgCanvas = document.getElementById('bg-particles');
    const bgCtx = bgCanvas.getContext('2d');
    let bgPixels = [];
    function resizeBg() { bgCanvas.width = window.innerWidth; bgCanvas.height = window.innerHeight; }
    window.addEventListener('resize', resizeBg); resizeBg();
    class BgPixel {
      constructor() { this.reset(); }
      reset() {
        const side = Math.random() > 0.5 ? 0 : 1;
        const margin = bgCanvas.width * 0.35;
        this.x = side === 0 ? Math.random() * margin : bgCanvas.width - Math.random() * margin;
        this.y = bgCanvas.height + Math.random() * 80;
        this.size = Math.floor(Math.random() * 5) + 2;
        this.speedY = Math.random() * 0.6 + 0.2;
        this.speedX = (Math.random() - 0.5) * 0.6;
        this.alpha = Math.random() * 0.65 + 0.15;
        this.fadeRate = Math.random() * 0.003 + 0.001;
      }
      update() { this.y -= this.speedY; this.x += this.speedX; this.alpha -= this.fadeRate; if (this.alpha <= 0 || this.y < -10) this.reset(); }
      draw() {
        bgCtx.fillStyle = `rgba(179, 136, 255, ${this.alpha})`;
        bgCtx.fillRect(Math.floor(this.x), Math.floor(this.y), this.size, this.size);
        if (this.size > 4) { bgCtx.shadowBlur = 8; bgCtx.shadowColor = `rgba(201, 162, 255, ${this.alpha * 0.5})`; bgCtx.fillRect(Math.floor(this.x), Math.floor(this.y), 1, 1); bgCtx.shadowBlur = 0; }
      }
    }
    for (let i = 0; i < 200; i++) bgPixels.push(new BgPixel());
    function bgLoop() { bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height); bgPixels.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(bgLoop); }
    bgLoop();

    // PONG ENGINE
    const canvas = document.getElementById('pong-canvas');
    const ctx = canvas.getContext('2d');
    const paddleW = 8, paddleH = 50, ballSize = 8;
    const playerX = 10, aiX = canvas.width - paddleW - 10;
    let playerY = canvas.height/2 - paddleH/2, aiY = canvas.height/2 - paddleH/2;
    let ballX = canvas.width/2 - ballSize/2, ballY = canvas.height/2 - ballSize/2;
    let ballSpeedX = 3, ballSpeedY = 2, playerScore = 0, aiScore = 0, paused = false, maxSpeed = 9;
    let pongEffects = [], scoreFlash = 0;

    function spawnEffect(x, y, type, count = 15) {
      const colors = { miss: ['#ff9ebb', '#ff7a93', '#c9a2ff', '#ffffff'], paddle: ['#e2c8ff', '#b388ff', '#ffffff', '#d6a8ff'], wall: ['#b388ff', '#8a66cc', '#c9a2ff'] };
      const palette = colors[type] || colors.wall;
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2, speed = Math.random() * 4 + 1;
        pongEffects.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 1.0, decay: Math.random() * 0.035 + 0.02, size: Math.random() * 3 + 1, color: palette[Math.floor(Math.random() * palette.length)] });
      }
    }
    function updateEffects() {
      for (let i = pongEffects.length - 1; i >= 0; i--) {
        const p = pongEffects[i]; p.x += p.vx; p.y += p.vy; p.life -= p.decay;
        if (p.life <= 0) pongEffects.splice(i, 1);
      }
      if (scoreFlash > 0) scoreFlash -= 0.05;
    }
    function drawEffects() {
      pongEffects.forEach(p => { ctx.globalAlpha = Math.max(0, p.life); ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, p.size, p.size); });
      ctx.globalAlpha = 1;
      if (scoreFlash > 0) { ctx.fillStyle = `rgba(201, 162, 255, ${scoreFlash * 0.3})`; ctx.fillRect(0, 0, canvas.width, canvas.height); }
    }

    const keys = {};
    window.addEventListener('keydown', e => { keys[e.key] = true; if (e.key === ' ') { paused = !paused; if (!paused) loop(); } });
    window.addEventListener('keyup', e => keys[e.key] = false);
    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect(); const scaleY = canvas.height / rect.height;
      playerY = (e.clientY - rect.top) * scaleY - paddleH/2;
    });

    function resetGame() {
      ballX = canvas.width/2 - ballSize/2; ballY = canvas.height/2 - ballSize/2;
      ballSpeedX = 3 * (Math.random() > 0.5 ? 1 : -1); ballSpeedY = 2 * (Math.random() > 0.5 ? 1 : -1);
      playerY = aiY = canvas.height/2 - paddleH/2; playerScore = aiScore = 0; pongEffects = []; scoreFlash = 0;
    }
    function update() {
      if (paused) return;
      const speed = 5;
      if (keys['w'] || keys['W'] || keys['ArrowUp']) playerY -= speed;
      if (keys['s'] || keys['S'] || keys['ArrowDown']) playerY += speed;
      playerY = Math.max(0, Math.min(canvas.height - paddleH, playerY));
      const aiCenter = aiY + paddleH/2; aiY += (ballY - aiCenter) * 0.09; aiY = Math.max(0, Math.min(canvas.height - paddleH, aiY));
      ballX += ballSpeedX; ballY += ballSpeedY;
      if (ballY <= 0) { ballY = 0; ballSpeedY = Math.abs(ballSpeedY); spawnEffect(ballX + ballSize/2, 0, 'wall', 8); }
      if (ballY + ballSize >= canvas.height) { ballY = canvas.height - ballSize; ballSpeedY = -Math.abs(ballSpeedY); spawnEffect(ballX + ballSize/2, canvas.height, 'wall', 8); }
      if (ballX <= playerX + paddleW && ballX + ballSize >= playerX && ballY + ballSize >= playerY && ballY <= playerY + paddleH) {
        const hitPos = (ballY - playerY) / paddleH; ballSpeedX = Math.abs(ballSpeedX) * 1.05; ballSpeedY = (hitPos - 0.5) * 6; spawnEffect(ballX + ballSize, ballY + ballSize/2, 'paddle', 12);
      }
      if (ballX + ballSize >= aiX && ballX <= aiX + paddleW && ballY + ballSize >= aiY && ballY <= aiY + paddleH) {
        const hitPos = (ballY - aiY) / paddleH; ballSpeedX = -Math.abs(ballSpeedX) * 1.05; ballSpeedY = (hitPos - 0.5) * 6; spawnEffect(ballX, ballY + ballSize/2, 'paddle', 12);
      }
      if (Math.abs(ballSpeedX) > maxSpeed) ballSpeedX = maxSpeed * Math.sign(ballSpeedX);
      if (Math.abs(ballSpeedY) > maxSpeed) ballSpeedY = maxSpeed * Math.sign(ballSpeedY);
      if (ballX < 0) { aiScore++; spawnEffect(ballX, ballY + ballSize/2, 'miss', 30); scoreFlash = 1.0; resetBall(); }
      if (ballX > canvas.width) { playerScore++; spawnEffect(ballX, ballY + ballSize/2, 'miss', 30); scoreFlash = 1.0; resetBall(); }
    }
    function resetBall() { ballX = canvas.width/2 - ballSize/2; ballY = canvas.height/2 - ballSize/2; ballSpeedX = 3 * (Math.random() > 0.5 ? 1 : -1); ballSpeedY = 2 * (Math.random() > 0.5 ? 1 : -1); }
    function draw() {
      ctx.fillStyle = '#0d0716'; ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.setLineDash([4, 6]); ctx.beginPath(); ctx.moveTo(canvas.width/2, 0); ctx.lineTo(canvas.width/2, canvas.height); ctx.strokeStyle = 'rgba(201, 162, 255, 0.3)'; ctx.lineWidth = 2; ctx.stroke(); ctx.setLineDash([]);
      ctx.fillStyle = '#e2c8ff'; ctx.fillRect(playerX, playerY, paddleW, paddleH);
      ctx.fillStyle = '#b388ff'; ctx.fillRect(aiX, aiY, paddleW, paddleH);
      ctx.fillStyle = '#ffffff'; ctx.fillRect(ballX, ballY, ballSize, ballSize);
      ctx.font = "16px 'Press Start 2P', monospace"; ctx.textAlign = 'center';
      ctx.fillStyle = scoreFlash > 0.5 ? '#ffffff' : '#e2c8ff'; ctx.fillText(playerScore, canvas.width/2 + 40, 30);
      ctx.fillStyle = '#b388ff'; ctx.fillText(aiScore, canvas.width/2 - 40, 30);
      drawEffects();
      if (paused) { ctx.fillStyle = 'rgba(13, 7, 22, 0.75)'; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = '#e2c8ff'; ctx.fillText('ПАУЗА', canvas.width/2, canvas.height/2 + 6); }
    }
    function loop() { if (paused) return; update(); updateEffects(); draw(); requestAnimationFrame(loop); }
    resetGame(); loop();
  </script>
</body>
</html>
